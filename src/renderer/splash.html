<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启动中 - 薄膜测厚系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0a1628 0%, #020812 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            overflow: hidden;
            user-select: none;
            /* 为透明窗口准备（如果 Electron 设置了 transparent: true） */
            background-color: transparent;
        }

        /* 主容器 */
        .splash-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;

        }

        /* Canvas 用于绘制波形和粒子背景 */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 中心内容（位于顶层） */
        .center-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 品牌标志：TMS 文字发光 */
        .brand {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #00d4ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 114, 255, 0.5);
            margin-bottom: 10px;
            animation: glowPulse 2s ease-in-out infinite alternate;
        }
        .brand-sub {
            font-size: 20px;
            letter-spacing: 6px;
            color: rgba(0, 180, 255, 0.7);
            text-transform: uppercase;
            margin-top: -8px;
            font-weight: 300;
        }
        .en {
          margin-top: 10px;
        }

        /* 旋转光环（纯CSS） */
        .ring-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid #00d4ff;
            border-bottom: 2px solid #0072ff;
            animation: spin 3s linear infinite;
        }
        .ring::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            border: 1px solid rgba(0, 180, 255, 0.2);
            border-left: 1px solid #00d4ff;
            animation: spin 5s linear infinite reverse;
        }
        /* 中心小圆点（模拟测量探头） */
        .ring-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
            background: radial-gradient(circle, #00d4ff, #0072ff);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 180, 255, 0.8);
            animation: dotPulse 1.5s ease-in-out infinite alternate;
        }

        /* 底部加载进度点 */
        .loader-dots {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            z-index: 1;
        }
        .loader-dots span {
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #0072ff;
            animation: dotBounce 1.4s ease-in-out infinite both;
        }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        .loader-dots span:nth-child(3) { animation-delay: 0s; }

        /* 版本信息 */
        .version {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 1;
        }

        /* 动画关键帧 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px rgba(0, 114, 255, 0.3); }
            100% { text-shadow: 0 0 60px rgba(0, 180, 255, 0.8); }
        }
        @keyframes dotPulse {
            0% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <!-- 画布背景（波形 + 粒子） -->
        <canvas id="bgCanvas"></canvas>

        <!-- 中心内容 -->
        <div class="center-content">
            <div class="brand">JJSK</div>
            <div class="brand-sub">在线薄膜厚度测量系统</div>
            <div class="brand-sub en">Thickness Measurement System</div>

            <div class="ring-container">
                <div class="ring"></div>
                <div class="ring-dot"></div>
            </div>

            <div class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="version">v3.2.1 · 启动中</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // 粒子系统
            const particles = [];
            const PARTICLE_COUNT = 60;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.2,
                });
            }

            // 波形参数
            let waveOffset = 0;

            function draw() {
                ctx.clearRect(0, 0, width, height);

                // ----- 1. 绘制动态波形（模拟厚度信号） -----
                const waveColor = 'rgba(0, 180, 255, 0.25)';
                ctx.beginPath();
                ctx.strokeStyle = waveColor;
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(0, 180, 255, 0.4)';
                ctx.shadowBlur = 15;

                const centerY = height / 2 + 30; // 稍偏下，给上面内容留空间
                const amplitude = 40 + 10 * Math.sin(Date.now() / 2000); // 动态幅度
                const frequency = 0.02;

                ctx.moveTo(0, centerY + Math.sin(waveOffset) * amplitude);

                for (let x = 0; x <= width; x += 2) {
                    const y = centerY +
                              Math.sin(x * frequency + waveOffset) * amplitude * 0.8 +
                              Math.sin(x * frequency * 1.7 + waveOffset * 0.7) * amplitude * 0.4;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                // 填充波形下方渐变（模拟厚度区域）
                const grad = ctx.createLinearGradient(0, centerY - 80, 0, centerY + 80);
                grad.addColorStop(0, 'rgba(0, 180, 255, 0.05)');
                grad.addColorStop(0.5, 'rgba(0, 100, 255, 0.10)');
                grad.addColorStop(1, 'rgba(0, 180, 255, 0.05)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(0, centerY + Math.sin(waveOffset) * amplitude);
                for (let x = 0; x <= width; x += 2) {
                    const y = centerY +
                              Math.sin(x * frequency + waveOffset) * amplitude * 0.8 +
                              Math.sin(x * frequency * 1.7 + waveOffset * 0.7) * amplitude * 0.4;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(width, centerY + 80);
                ctx.lineTo(0, centerY + 80);
                ctx.closePath();
                ctx.fill();

                // 更新波形偏移
                waveOffset += 0.02;

                // ----- 2. 绘制粒子（科技感漂浮） -----
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    // 边界回弹
                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 200, 255, ${p.alpha})`;
                    ctx.shadowColor = 'rgba(0, 180, 255, 0.6)';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                // ----- 3. 网格线（增强科技感） -----
                ctx.strokeStyle = 'rgba(0, 180, 255, 0.05)';
                ctx.lineWidth = 0.5;
                const step = 60;
                for (let x = step; x < width; x += step) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                for (let y = step; y < height; y += step) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>
</body>
</html>
